name: release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

env:
  PNPM_VERSION: 9
  NODE_VERSION: 20
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  # ----------------------------------------------------------------------------
  # 1. Changesets: open Version PR or publish to npm when versions land on main
  # ----------------------------------------------------------------------------
  changesets:
    name: Version PR / Publish npm
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: pnpm -w exec turbo run build --filter=./packages/*

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # `publish` is invoked only when there are no pending changesets,
          # which is changesets/action's signal that versions have been merged.
          publish: pnpm exec changeset publish --access public
          version: pnpm exec changeset version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ----------------------------------------------------------------------------
  # 2. Desktop binaries (Tauri) — replicates the ci-desktop matrix.
  #    Six target triples: macOS x64/arm64, Windows x64/arm64, Linux x64/arm64.
  # ----------------------------------------------------------------------------
  build-desktop:
    name: Desktop ${{ matrix.target }}
    needs: changesets
    if: needs.changesets.outputs.published == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rust_target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            rust_target: aarch64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust_target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            rust_target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            file

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch Tauri sidecars
        shell: bash
        run: |
          if [ -f infra/tauri-sidecars/fetch.sh ]; then
            bash infra/tauri-sidecars/fetch.sh "${{ matrix.target }}" || true
          fi

      - name: Build desktop frontend
        run: pnpm -w exec turbo run build --filter=@ud/desktop

      - name: Build Tauri bundle
        working-directory: apps/desktop
        run: pnpm exec tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

      - name: Stage artifacts
        id: stage
        shell: bash
        run: |
          set -e
          out="staging"
          mkdir -p "$out"
          bundle_dir="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ -d "$bundle_dir" ]; then
            find "$bundle_dir" -type f \
              \( -name '*.dmg' -o -name '*.app.tar.gz' \
                 -o -name '*.msi' -o -name '*.exe' \
                 -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) \
              -exec cp {} "$out/" \;
          fi
          # Compute SHA-256 checksums per artifact
          ( cd "$out" && for f in *; do
              [ -f "$f" ] || continue
              if command -v sha256sum >/dev/null 2>&1; then
                sha256sum "$f" >> "checksums-${{ matrix.target }}.txt"
              else
                shasum -a 256 "$f" >> "checksums-${{ matrix.target }}.txt"
              fi
            done )
          ls -la "$out"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: staging/*
          if-no-files-found: warn
          retention-days: 14

  # ----------------------------------------------------------------------------
  # 3. Docker image for the API (GHCR), tagged with semver from latest tag
  # ----------------------------------------------------------------------------
  publish-docker:
    name: Publish API image
    needs: changesets
    if: needs.changesets.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine API version tag
        id: ver
        shell: bash
        run: |
          # Prefer an annotated tag like api@x.y.z or apps/api@x.y.z, else fallback to latest vX.Y.Z
          tag=$(git tag --list 'api@*' --sort=-v:refname | head -n1)
          if [ -z "$tag" ]; then
            tag=$(git tag --list 'apps/api@*' --sort=-v:refname | head -n1)
          fi
          if [ -z "$tag" ]; then
            tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          fi
          version="${tag##*@}"
          version="${version#v}"
          if [ -z "$version" ]; then
            version="0.0.0-$(git rev-parse --short HEAD)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved API version: $version"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.ver.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.ver.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.ver.outputs.version }}
            type=raw,value=latest

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------------------------
  # 4. SBOM generation (CycloneDX) for Node workspace + Cargo workspace
  # ----------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    needs: changesets
    if: needs.changesets.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install CycloneDX CLI tools
        run: |
          npm install -g @cyclonedx/cyclonedx-npm @cyclonedx/cdxgen
          cargo install cargo-cyclonedx --locked

      - name: SBOM (Node workspace)
        run: |
          mkdir -p sbom
          cdxgen -t js -o sbom/sbom-node.cdx.json -r .

      - name: SBOM (Cargo - desktop)
        working-directory: apps/desktop/src-tauri
        run: cargo cyclonedx --format json --output-pattern bom

      - name: Aggregate SBOM artifacts
        run: |
          mkdir -p sbom-out
          cp sbom/sbom-node.cdx.json sbom-out/sbom-node.cdx.json
          find apps/desktop/src-tauri -maxdepth 3 -name 'bom.json' -exec cp {} sbom-out/sbom-cargo-desktop.cdx.json \; || true
          ls -la sbom-out

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-out/*
          if-no-files-found: warn
          retention-days: 30

  # ----------------------------------------------------------------------------
  # 5. GitHub Release: aggregate desktop binaries + checksums + SBOM
  # ----------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    needs: [changesets, build-desktop, sbom]
    if: needs.changesets.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          # Prefer the most recent semver tag created by changesets.
          tag=$(git tag --points-at HEAD | grep -E '@[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
          if [ -z "$tag" ]; then
            tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          fi
          if [ -z "$tag" ]; then
            tag="v0.0.0-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: release-assets

      - name: Generate aggregated checksums.txt
        working-directory: release-assets
        shell: bash
        run: |
          : > checksums.txt
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in
              checksums.txt|checksums-*.txt) continue ;;
            esac
            sha256sum "$f" >> checksums.txt
          done
          # Append per-target checksum files for traceability
          if ls checksums-*.txt >/dev/null 2>&1; then
            echo "" >> checksums.txt
            echo "# Per-target checksums" >> checksums.txt
            cat checksums-*.txt >> checksums.txt
          fi
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
