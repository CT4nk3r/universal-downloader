name: ci-e2e

on:
  schedule:
    # Nightly at 03:17 UTC (off-peak, avoids top-of-hour CI contention)
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable verbose Playwright/WebDriver logging'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

concurrency:
  group: ci-e2e-${{ github.ref }}
  cancel-in-progress: false

env:
  PNPM_VERSION: '9'
  NODE_VERSION: '20'
  RUST_BACKTRACE: '1'

jobs:
  # ---------------------------------------------------------------------------
  # Web E2E (Playwright against built preview + dockerised API)
  # ---------------------------------------------------------------------------
  web-e2e:
    name: web-e2e (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      API_BASE_URL: http://localhost:8080
      WEB_BASE_URL: http://localhost:4173
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: pw-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pw-${{ runner.os }}-

      - name: Install Playwright browsers + system deps
        run: pnpm --filter @ud/e2e-web exec playwright install --with-deps chromium firefox webkit

      - name: Bring up API stack (docker compose)
        run: |
          docker compose -f infra/docker/compose.yml up -d --wait api
          docker compose -f infra/docker/compose.yml ps

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            if curl -fsS "$API_BASE_URL/healthz" >/dev/null 2>&1; then
              echo "API is healthy"
              exit 0
            fi
            echo "waiting for api ($i/60)..."
            sleep 2
          done
          echo "API did not become healthy" >&2
          docker compose -f infra/docker/compose.yml logs api
          exit 1

      - name: Build web
        run: pnpm --filter @universal-downloader/web build
        env:
          VITE_API_BASE_URL: ${{ env.API_BASE_URL }}

      - name: Start web preview
        run: |
          pnpm --filter @universal-downloader/web exec vite preview --host 127.0.0.1 --port 4173 \
            > web-preview.log 2>&1 &
          echo $! > web-preview.pid
          for i in {1..30}; do
            if curl -fsS "$WEB_BASE_URL" >/dev/null 2>&1; then
              echo "web preview ready"
              exit 0
            fi
            sleep 1
          done
          echo "web preview failed to start" >&2
          cat web-preview.log
          exit 1

      - name: Run Playwright tests
        run: pnpm --filter @ud/e2e-web exec playwright test
        env:
          DEBUG: ${{ github.event.inputs.debug == 'true' && 'pw:api' || '' }}

      - name: Stop web preview
        if: always()
        run: |
          if [ -f web-preview.pid ]; then
            kill "$(cat web-preview.pid)" || true
          fi

      - name: Tear down compose
        if: always()
        run: docker compose -f infra/docker/compose.yml down -v --remove-orphans

      - name: Upload Playwright traces & report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-traces
          path: |
            packages/e2e-web/playwright-report/**
            packages/e2e-web/test-results/**
            web-preview.log
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Desktop E2E — Windows (tauri-driver + Edge WebDriver)
  # ---------------------------------------------------------------------------
  desktop-e2e-windows:
    name: desktop-e2e (windows)
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      TAURI_DRIVER_PORT: '4444'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Edge WebDriver (matches preinstalled Edge)
        shell: pwsh
        run: |
          $edge = (Get-AppxPackage Microsoft.Edge -ErrorAction SilentlyContinue)
          $version = (Get-ItemProperty 'HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{56EB18F8-B008-4CBD-B6D2-8C97FE7E9062}' -ErrorAction SilentlyContinue).pv
          if (-not $version) {
            $version = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\EdgeUpdate\Clients\{56EB18F8-B008-4CBD-B6D2-8C97FE7E9062}' -ErrorAction SilentlyContinue).pv
          }
          if (-not $version) { throw 'Could not detect Edge version' }
          Write-Host "Edge version: $version"
          $url = "https://msedgedriver.azureedge.net/$version/edgedriver_win64.zip"
          Invoke-WebRequest -Uri $url -OutFile edgedriver.zip
          Expand-Archive -Force edgedriver.zip -DestinationPath "$env:USERPROFILE\edgedriver"
          echo "$env:USERPROFILE\edgedriver" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop (debug)
        run: pnpm --filter @universal-downloader/desktop tauri build --debug

      - name: Run desktop E2E
        run: pnpm --filter @ud/e2e-desktop test
        env:
          TAURI_DRIVER: tauri-driver
          WEBDRIVER_URL: http://127.0.0.1:${{ env.TAURI_DRIVER_PORT }}

      - name: Upload desktop E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-windows
          path: |
            packages/e2e-desktop/test-results/**
            packages/e2e-desktop/screenshots/**
            packages/e2e-desktop/logs/**
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Desktop E2E — Linux (webkit2gtk WebDriver)
  # ---------------------------------------------------------------------------
  desktop-e2e-linux:
    name: desktop-e2e (linux)
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    env:
      TAURI_DRIVER_PORT: '4444'
      WEBKIT_DISABLE_COMPOSITING_MODE: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Tauri + WebKit system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            webkit2gtk-driver \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential \
            curl \
            wget \
            file \
            xvfb \
            at-spi2-core

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop (debug)
        run: pnpm --filter @universal-downloader/desktop tauri build --debug

      - name: Run desktop E2E (under Xvfb)
        run: |
          xvfb-run -a --server-args="-screen 0 1280x800x24" \
            pnpm --filter @ud/e2e-desktop test
        env:
          TAURI_DRIVER: tauri-driver
          WEBDRIVER_URL: http://127.0.0.1:${{ env.TAURI_DRIVER_PORT }}

      - name: Upload desktop E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-linux
          path: |
            packages/e2e-desktop/test-results/**
            packages/e2e-desktop/screenshots/**
            packages/e2e-desktop/logs/**
          if-no-files-found: ignore
          retention-days: 14
