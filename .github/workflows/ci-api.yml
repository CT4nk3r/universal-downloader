name: ci-api

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'apps/api/**'
      - 'packages/shared-types/**'
      - 'tests/api/**'
      - '.github/workflows/ci-api.yml'
      - 'infra/docker/api.Dockerfile'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/shared-types/**'
      - 'tests/api/**'
      - '.github/workflows/ci-api.yml'
      - 'infra/docker/api.Dockerfile'

concurrency:
  group: ci-api-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/ct4nk3r/universal-downloader-api
  PYTHON_DEFAULT: '3.12'

jobs:
  lint:
    name: lint (ruff, mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: Mypy
        run: mypy app

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      UD_REDIS_URL: redis://localhost:6379/0
      REDIS_URL: redis://localhost:6379/0
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: |
          pytest -v --cov=app --cov-report=xml \
            ../../tests/api app/

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: apps/api/coverage.xml
          if-no-files-found: ignore

  contract:
    name: contract (schemathesis)
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      UD_REDIS_URL: redis://localhost:6379/0
      REDIS_URL: redis://localhost:6379/0
      UD_PORT: '8787'
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install "schemathesis>=3.36,<4"

      - name: Start API
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8787 \
            > /tmp/api.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8787/healthz >/dev/null 2>&1 \
               || curl -fsS http://127.0.0.1:8787/v1/health >/dev/null 2>&1; then
              echo "API up"; exit 0
            fi
            sleep 1
          done
          echo "API failed to start"; cat /tmp/api.log; exit 1

      - name: Run schemathesis
        run: |
          schemathesis run \
            --checks all \
            --hypothesis-max-examples=25 \
            http://127.0.0.1:8787/openapi.json

      - name: Dump API logs
        if: always()
        run: cat /tmp/api.log || true

  docker-build-push:
    name: docker build & push (multi-arch)
    runs-on: ubuntu-latest
    needs: [test, contract]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ci-api
          cache-to: type=gha,scope=ci-api,mode=max
          provenance: false
