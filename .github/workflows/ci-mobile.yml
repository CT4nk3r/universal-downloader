name: ci-mobile

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/mobile/**'
      - 'packages/api-client/**'
      - 'packages/shared-types/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci-mobile.yml'
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/api-client/**'
      - 'packages/shared-types/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci-mobile.yml'

concurrency:
  group: ci-mobile-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PNPM_VERSION: 9
  NODE_VERSION: 20

jobs:
  ios:
    name: iOS (build + test)
    runs-on: macos-14
    timeout-minutes: 60
    env:
      DEVELOPER_DIR: /Applications/Xcode_15.4.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Generate api-client schema
        run: pnpm --filter @universal-downloader/api-client codegen

      - name: Detect iOS scaffold
        id: ios_scaffold
        run: |
          if [ -f apps/mobile/ios/Gemfile ] && ls apps/mobile/ios/*.xcworkspace >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::iOS scaffold incomplete (missing Gemfile or .xcworkspace); skipping native build."
          fi

      - name: Setup Ruby
        if: steps.ios_scaffold.outputs.ready == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: apps/mobile/ios

      - name: Cache CocoaPods
        if: steps.ios_scaffold.outputs.ready == 'true'
        uses: actions/cache@v4
        with:
          path: |
            apps/mobile/ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Pod install
        if: steps.ios_scaffold.outputs.ready == 'true'
        working-directory: apps/mobile/ios
        run: bundle exec pod install --repo-update

      - name: Xcode build-for-testing
        if: steps.ios_scaffold.outputs.ready == 'true'
        working-directory: apps/mobile/ios
        run: |
          set -o pipefail
          xcodebuild \
            -workspace UniversalDownloader.xcworkspace \
            -scheme UniversalDownloader \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing | xcpretty

      - name: Xcode test-without-building
        if: steps.ios_scaffold.outputs.ready == 'true'
        working-directory: apps/mobile/ios
        run: |
          set -o pipefail
          xcodebuild \
            -workspace UniversalDownloader.xcworkspace \
            -scheme UniversalDownloader \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            -resultBundlePath build/TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building | xcpretty

      - name: Upload xcresult
        if: always() && steps.ios_scaffold.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcresult
          path: apps/mobile/ios/build/TestResults.xcresult
          if-no-files-found: warn
          retention-days: 14

  android:
    name: Android (instrumented tests)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Generate api-client schema
        run: pnpm --filter @universal-downloader/api-client codegen

      - name: Detect Android scaffold
        id: android_scaffold
        run: |
          if [ -x apps/mobile/android/gradlew ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Android scaffold incomplete (missing gradlew); skipping native build."
          fi

      - name: Setup JDK 17
        if: steps.android_scaffold.outputs.ready == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        if: steps.android_scaffold.outputs.ready == 'true'
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        if: steps.android_scaffold.outputs.ready == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Enable KVM
        if: steps.android_scaffold.outputs.ready == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Assemble debug + androidTest
        if: steps.android_scaffold.outputs.ready == 'true'
        working-directory: apps/mobile/android
        run: ./gradlew :app:assembleDebug :app:assembleAndroidTest --no-daemon

      - name: Run connected Android tests on emulator
        if: steps.android_scaffold.outputs.ready == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          working-directory: apps/mobile/android
          script: ./gradlew :app:connectedDebugAndroidTest --no-daemon

      - name: Upload Android test reports
        if: always() && steps.android_scaffold.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            apps/mobile/android/app/build/reports/androidTests/**
            apps/mobile/android/app/build/outputs/androidTest-results/**
          if-no-files-found: warn
          retention-days: 14

  unit:
    name: Unit tests (jest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Generate api-client schema
        run: pnpm --filter @universal-downloader/api-client codegen

      - name: Detect mobile jest project
        id: detect
        run: |
          if [ -f apps/mobile/package.json ] && grep -q '"jest"' apps/mobile/package.json; then
            echo "has_jest=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_jest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run jest
        if: steps.detect.outputs.has_jest == 'true'
        run: pnpm --filter @universal-downloader/mobile test -- --ci --reporters=default --passWithNoTests

      - name: Skip notice
        if: steps.detect.outputs.has_jest != 'true'
        run: echo "No mobile jest project detected; skipping."
