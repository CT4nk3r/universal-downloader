name: ci-web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/ui/**'
      - 'packages/shared-types/**'
      - 'packages/api-client/**'
      - 'packages/core-logic/**'
      - '.github/workflows/ci-web.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/ui/**'
      - 'packages/shared-types/**'
      - 'packages/api-client/**'
      - 'packages/core-logic/**'
      - '.github/workflows/ci-web.yml'

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9
  NODE_VERSION: 20

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm -w exec turbo run lint --filter=@universal-downloader/web --filter=@universal-downloader/ui --filter=@universal-downloader/shared-types --filter=@universal-downloader/api-client --filter=@universal-downloader/core-logic
      - name: Typecheck (tsc --noEmit)
        run: pnpm -w exec turbo run typecheck --filter=@universal-downloader/web --filter=@universal-downloader/ui --filter=@universal-downloader/shared-types --filter=@universal-downloader/api-client --filter=@universal-downloader/core-logic

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Unit tests via Turbo
        run: pnpm -w exec turbo run test --filter=@universal-downloader/ui --filter=@universal-downloader/api-client --filter=@universal-downloader/core-logic

  build:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build via Turbo
        run: pnpm -w exec turbo run build --filter=@universal-downloader/web
      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error
          retention-days: 7

  preview-deploy:
    name: Vercel Preview Deploy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: preview
    steps:
      - name: Check for Vercel token
        id: gate
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not configured; skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
      - if: steps.gate.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
      - if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - if: steps.gate.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.gate.outputs.skip != 'true'
        name: Install Vercel CLI
        run: pnpm add -g vercel@latest
      - if: steps.gate.outputs.skip != 'true'
        name: Pull Vercel env (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
      - if: steps.gate.outputs.skip != 'true'
        name: Build (Vercel)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
      - if: steps.gate.outputs.skip != 'true'
        name: Deploy preview
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview: $url"
        working-directory: apps/web
      - name: Comment preview URL
        if: steps.gate.outputs.skip != 'true' && steps.deploy.outputs.url != ''
        uses: actions/github-script@v9
        with:
          script: |
            const url = `${{ steps.deploy.outputs.url }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Web preview deployed: ${url}`
            });

  prod-deploy:
    name: Vercel Production Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: production
    steps:
      - name: Check for Vercel token
        id: gate
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not configured; skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
      - if: steps.gate.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
      - if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - if: steps.gate.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.gate.outputs.skip != 'true'
        name: Install Vercel CLI
        run: pnpm add -g vercel@latest
      - if: steps.gate.outputs.skip != 'true'
        name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
      - if: steps.gate.outputs.skip != 'true'
        name: Build (Vercel, prod)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
      - if: steps.gate.outputs.skip != 'true'
        name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
