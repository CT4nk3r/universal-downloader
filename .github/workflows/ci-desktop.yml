name: ci-desktop

on:
  push:
    branches: [main]
    paths:
      - 'apps/desktop/**'
      - 'packages/ui/**'
      - 'packages/shared-types/**'
      - 'packages/api-client/**'
      - 'packages/core-logic/**'
      - 'infra/tauri-sidecars/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/ci-desktop.yml'
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'packages/ui/**'
      - 'packages/shared-types/**'
      - 'packages/api-client/**'
      - 'packages/core-logic/**'
      - 'infra/tauri-sidecars/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/ci-desktop.yml'
  workflow_dispatch:

concurrency:
  group: ci-desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9
  NODE_VERSION: 20
  # Tauri-specific: never attempt code signing in CI (J3.4 scope: no signing)
  TAURI_SIGNING_PRIVATE_KEY: ''
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  RUST_BACKTRACE: short

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75
    # linux-aarch64 cross-compiles Tauri via cross-rs; the default cross
    # container lacks the aarch64 WebKitGTK/glib sysroot, so the build
    # currently fails. Keep it non-blocking until a custom cross image or
    # a native arm64 runner is wired up.
    continue-on-error: ${{ matrix.use_cross == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ------------------------------------------------------------------
          # Windows x86_64 (native MSVC)
          # ------------------------------------------------------------------
          - label: windows-x86_64
            runner: windows-latest
            os: windows
            target: x86_64-pc-windows-msvc
            tauri_target: x86_64-pc-windows-msvc
            use_cross: false
            sidecar_script: pwsh
            artifact_glob: |
              apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

          # ------------------------------------------------------------------
          # Windows aarch64 (native ARM64 runner). If the runner label is not
          # available to the repo, swap `runner` to `windows-latest` and set
          # `use_cross: true` to cross-compile (no bundle, build only).
          # ------------------------------------------------------------------
          - label: windows-aarch64
            runner: windows-11-arm
            os: windows
            target: aarch64-pc-windows-msvc
            tauri_target: aarch64-pc-windows-msvc
            use_cross: false
            sidecar_script: pwsh
            artifact_glob: |
              apps/desktop/src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
              apps/desktop/src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe

          # ------------------------------------------------------------------
          # macOS universal2 (covers x86_64-apple-darwin + aarch64-apple-darwin)
          # Tauri's `universal-apple-darwin` target performs the lipo for us.
          # ------------------------------------------------------------------
          - label: macos-universal
            runner: macos-14
            os: macos
            target: universal-apple-darwin
            tauri_target: universal-apple-darwin
            use_cross: false
            sidecar_script: bash
            artifact_glob: |
              apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz

          # ------------------------------------------------------------------
          # Linux x86_64 (native, AppImage + deb)
          # ------------------------------------------------------------------
          - label: linux-x86_64
            runner: ubuntu-22.04
            os: linux
            target: x86_64-unknown-linux-gnu
            tauri_target: x86_64-unknown-linux-gnu
            use_cross: false
            sidecar_script: bash
            artifact_glob: |
              apps/desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              apps/desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              apps/desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

          # ------------------------------------------------------------------
          # Linux aarch64 (cross-compiled via cross-rs).
          # `cross` runs the Rust build inside a multi-arch container with
          # the necessary sysroot + linker. The Tauri JS bundling step runs
          # on the host. Bundles are limited to .deb/.rpm/.AppImage.
          # ------------------------------------------------------------------
          - label: linux-aarch64
            runner: ubuntu-22.04
            os: linux
            target: aarch64-unknown-linux-gnu
            tauri_target: aarch64-unknown-linux-gnu
            use_cross: true
            sidecar_script: bash
            artifact_glob: |
              apps/desktop/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              apps/desktop/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
              apps/desktop/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/*.rpm

    steps:
      # ----------------------------------------------------------------------
      # Source + toolchains
      # ----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          # rust-toolchain.toml is auto-honored; declaring targets here so
          # rustup pre-installs them. For `universal-apple-darwin` we add
          # both underlying triples; for `cross` builds we let cross-rs
          # provision its own sysroot inside the container.
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'x86_64-apple-darwin,aarch64-apple-darwin' || (matrix.use_cross && '' || matrix.target) }}

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          key: ${{ matrix.target }}
          shared-key: tauri-${{ matrix.target }}

      # ----------------------------------------------------------------------
      # Linux: install WebKitGTK + bundling deps (see infra/ci/desktop-notes.md)
      # ----------------------------------------------------------------------
      - name: Install Linux build deps
        if: matrix.os == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            patchelf \
            file \
            wget \
            xdg-utils \
            build-essential \
            pkg-config

      - name: Install cross-rs (Linux aarch64 only)
        if: matrix.use_cross == true && matrix.os == 'linux'
        shell: bash
        run: |
          cargo install cross --git https://github.com/cross-rs/cross --locked

      # ----------------------------------------------------------------------
      # JS deps
      # ----------------------------------------------------------------------
      - name: pnpm install
        shell: bash
        run: pnpm install --frozen-lockfile

      # ----------------------------------------------------------------------
      # Sidecars (yt-dlp + ffmpeg) — populates apps/desktop/src-tauri/binaries/
      # ----------------------------------------------------------------------
      - name: Fetch sidecars (PowerShell)
        if: matrix.sidecar_script == 'pwsh'
        shell: pwsh
        run: pwsh -File infra/tauri-sidecars/fetch.ps1

      - name: Fetch sidecars (bash)
        if: matrix.sidecar_script == 'bash'
        shell: bash
        run: bash infra/tauri-sidecars/fetch.sh

      # ----------------------------------------------------------------------
      # Generate API-client types (schema.ts) before tauri's beforeBuildCommand.
      # The desktop `web:build` script runs tsc directly and does NOT traverse
      # Turbo's dependency graph, so codegen must be invoked explicitly here.
      # ----------------------------------------------------------------------
      - name: Generate API-client schema
        shell: bash
        run: pnpm --filter @universal-downloader/api-client codegen

      # ----------------------------------------------------------------------
      # Tauri build (no signing — explicitly omit --sign / signing env vars)
      # ----------------------------------------------------------------------
      - name: Tauri build (native)
        if: matrix.use_cross != true
        shell: bash
        run: |
          pnpm --filter @universal-downloader/desktop tauri build --target ${{ matrix.tauri_target }} --ci

      # cross-rs path: build the Rust binary with cross, then re-invoke
      # tauri to package (bundling tools live on the host runner).
      - name: Tauri build (cross-rs)
        if: matrix.use_cross == true
        shell: bash
        env:
          # Tell tauri-cli to use `cross` instead of `cargo` for the Rust step.
          TAURI_CLI_RUNNER: cross
        run: |
          rustup target add ${{ matrix.target }} || true
          pnpm --filter @universal-downloader/desktop tauri build --target ${{ matrix.tauri_target }} --ci --runner cross

      # ----------------------------------------------------------------------
      # Artifact upload (best-effort glob; missing bundles do not fail)
      # ----------------------------------------------------------------------
      - name: Upload bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 14

      - name: Upload raw binary (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}-binary
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/universal-downloader*
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/ud-desktop*
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/*.exe
          if-no-files-found: ignore
          retention-days: 7
