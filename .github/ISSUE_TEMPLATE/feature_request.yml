name: Feature request
description: Suggest an idea or enhancement
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Why is the current behavior insufficient?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      multiple: true
      options:
        - API
        - Web
        - Desktop
        - Mobile
        - Shared packages
        - Docs
        - CI/CD
  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions for this request
          required: true
        - label: This request respects the project's Responsible Use policy
          required: true
