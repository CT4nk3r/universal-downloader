openapi: 3.1.0
info:
  title: Universal Downloader API
  version: 0.1.0
  description: |
    yt-dlp + ffmpeg wrapper API for Universal Downloader by CT4nk3r.
    Single-user, bearer-token authenticated. Async job-based downloads
    with SSE progress streaming.
  contact:
    name: CT4nk3r
    url: https://github.com/CT4nk3r/universal-downloader
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8787/v1
    description: Local development
  - url: https://{host}/v1
    description: Self-hosted
    variables:
      host:
        default: downloader.example.com

security:
  - BearerAuth: []

tags:
  - name: meta
    description: Server metadata
  - name: probe
    description: URL inspection
  - name: jobs
    description: Download job lifecycle

paths:
  /health:
    get:
      tags: [meta]
      summary: Liveness probe
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /sites:
    get:
      tags: [meta]
      summary: List supported sites and capabilities
      operationId: listSites
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Site'

  /probe:
    post:
      tags: [probe]
      summary: Inspect a URL for available formats and metadata
      operationId: probeUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProbeRequest'
      responses:
        '200':
          description: Probe result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeResult'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnsupportedSite' }
        '502': { $ref: '#/components/responses/UpstreamError' }

  /jobs:
    get:
      tags: [jobs]
      summary: List download jobs
      operationId: listJobs
      parameters:
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/JobStatus' }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated job list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobList'
    post:
      tags: [jobs]
      summary: Create a new download job
      operationId: createJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '202':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnsupportedSite' }

  /jobs/{id}:
    parameters:
      - $ref: '#/components/parameters/JobId'
    get:
      tags: [jobs]
      summary: Get job by id
      operationId: getJob
      responses:
        '200':
          description: Job
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [jobs]
      summary: Cancel a running job or delete an artifact
      operationId: deleteJob
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /jobs/{id}/events:
    parameters:
      - $ref: '#/components/parameters/JobId'
    get:
      tags: [jobs]
      summary: Server-Sent Events stream of job progress
      operationId: streamJobEvents
      responses:
        '200':
          description: |
            text/event-stream of JobEvent messages. Event types:
            `progress`, `status`, `done`, `error`.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/JobEvent'
        '404': { $ref: '#/components/responses/NotFound' }

  /jobs/{id}/file:
    parameters:
      - $ref: '#/components/parameters/JobId'
    get:
      tags: [jobs]
      summary: Download the completed file (Range supported)
      operationId: downloadJobFile
      responses:
        '200':
          description: Full file
          content:
            application/octet-stream: { schema: { type: string, format: binary } }
        '206':
          description: Partial content
          content:
            application/octet-stream: { schema: { type: string, format: binary } }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Job not yet ready
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key

  parameters:
    JobId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    BadRequest:
      description: Bad request
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Unauthorized:
      description: Missing or invalid bearer token
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotFound:
      description: Resource not found
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    UnsupportedSite:
      description: URL is not from a supported site
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    UpstreamError:
      description: yt-dlp or upstream site failure
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  schemas:
    Health:
      type: object
      required: [status, version]
      properties:
        status: { type: string, enum: [ok] }
        version: { type: string }
        ytdlp_version: { type: string }
        ffmpeg_version: { type: string }
        uptime_seconds: { type: integer }

    SiteId:
      type: string
      enum: [youtube, x, facebook, reddit]

    Site:
      type: object
      required: [id, name, capabilities]
      properties:
        id: { $ref: '#/components/schemas/SiteId' }
        name: { type: string }
        domains: { type: array, items: { type: string } }
        capabilities:
          type: object
          properties:
            video: { type: boolean }
            audio: { type: boolean }
            subtitles: { type: boolean }
            live: { type: boolean }
            playlists: { type: boolean }

    ProbeRequest:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }

    Format:
      type: object
      required: [format_id, ext]
      properties:
        format_id: { type: string }
        ext: { type: string, examples: [mp4, m4a, webm, mp3] }
        resolution: { type: string, nullable: true, examples: ["1920x1080"] }
        height: { type: integer, nullable: true }
        width: { type: integer, nullable: true }
        fps: { type: number, nullable: true }
        vcodec: { type: string, nullable: true }
        acodec: { type: string, nullable: true }
        abr: { type: number, nullable: true, description: "Audio bitrate in kbps" }
        vbr: { type: number, nullable: true, description: "Video bitrate in kbps" }
        filesize: { type: integer, nullable: true }
        filesize_approx: { type: integer, nullable: true }
        has_audio: { type: boolean }
        has_video: { type: boolean }
        note: { type: string, nullable: true }

    Thumbnail:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }

    ProbeResult:
      type: object
      required: [site, id, title, formats]
      properties:
        site: { $ref: '#/components/schemas/SiteId' }
        id: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        uploader: { type: string, nullable: true }
        channel: { type: string, nullable: true }
        duration_seconds: { type: number, nullable: true }
        upload_date: { type: string, nullable: true, examples: ["20251231"] }
        view_count: { type: integer, nullable: true }
        like_count: { type: integer, nullable: true }
        webpage_url: { type: string, format: uri }
        thumbnails: { type: array, items: { $ref: '#/components/schemas/Thumbnail' } }
        formats: { type: array, items: { $ref: '#/components/schemas/Format' } }
        is_live: { type: boolean, default: false }
        age_limit: { type: integer, default: 0 }

    QualityPreset:
      type: string
      enum: [best, p2160, p1440, p1080, p720, p480, audio_mp3, audio_m4a]
      description: |
        Convenience preset that maps to a yt-dlp format selector server-side.
        - `best`: bestvideo*+bestaudio/best
        - `pNNNN`: best video <=NNNN merged with best audio, MP4
        - `audio_mp3` / `audio_m4a`: audio-only, transcoded if needed

    Container:
      type: string
      enum: [mp4, webm, mkv, m4a, mp3, opus]

    TimeRange:
      type: object
      properties:
        start_seconds: { type: number, minimum: 0 }
        end_seconds: { type: number, minimum: 0 }

    CreateJobRequest:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }
        preset: { $ref: '#/components/schemas/QualityPreset' }
        format_id:
          type: string
          description: Specific yt-dlp format id (overrides preset)
        container: { $ref: '#/components/schemas/Container' }
        audio_only: { type: boolean, default: false }
        subtitles:
          type: object
          properties:
            enabled: { type: boolean, default: false }
            languages: { type: array, items: { type: string }, default: [en] }
            embed: { type: boolean, default: true }
        time_range: { $ref: '#/components/schemas/TimeRange' }
        embed_thumbnail: { type: boolean, default: false }
        embed_metadata: { type: boolean, default: true }
        filename_template:
          type: string
          description: Override filename. Default `%(title)s [%(id)s].%(ext)s`

    JobStatus:
      type: string
      enum:
        - queued
        - probing
        - downloading
        - postprocessing
        - ready
        - failed
        - cancelled
        - expired

    JobProgress:
      type: object
      properties:
        percent: { type: number, minimum: 0, maximum: 100 }
        downloaded_bytes: { type: integer }
        total_bytes: { type: integer, nullable: true }
        speed_bps: { type: number, nullable: true }
        eta_seconds: { type: integer, nullable: true }
        fragment_index: { type: integer, nullable: true }
        fragment_count: { type: integer, nullable: true }

    Job:
      type: object
      required: [id, url, status, created_at]
      properties:
        id: { type: string, format: uuid }
        url: { type: string, format: uri }
        site: { $ref: '#/components/schemas/SiteId', nullable: true }
        status: { $ref: '#/components/schemas/JobStatus' }
        progress: { $ref: '#/components/schemas/JobProgress' }
        title: { type: string, nullable: true }
        thumbnail_url: { type: string, format: uri, nullable: true }
        request: { $ref: '#/components/schemas/CreateJobRequest' }
        created_at: { type: string, format: date-time }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        file:
          type: object
          nullable: true
          properties:
            filename: { type: string }
            size_bytes: { type: integer }
            mime_type: { type: string }
            sha256: { type: string }
            download_url: { type: string, format: uri }
        error:
          type: object
          nullable: true
          properties:
            code: { type: string }
            message: { type: string }

    JobList:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Job' } }
        next_cursor: { type: string, nullable: true }

    JobEvent:
      oneOf:
        - $ref: '#/components/schemas/JobEventProgress'
        - $ref: '#/components/schemas/JobEventStatus'
        - $ref: '#/components/schemas/JobEventDone'
        - $ref: '#/components/schemas/JobEventError'
      discriminator:
        propertyName: type
        mapping:
          progress: '#/components/schemas/JobEventProgress'
          status: '#/components/schemas/JobEventStatus'
          done: '#/components/schemas/JobEventDone'
          error: '#/components/schemas/JobEventError'

    JobEventProgress:
      type: object
      required: [type, job_id, progress]
      properties:
        type: { type: string, const: progress }
        job_id: { type: string, format: uuid }
        progress: { $ref: '#/components/schemas/JobProgress' }

    JobEventStatus:
      type: object
      required: [type, job_id, status]
      properties:
        type: { type: string, const: status }
        job_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/JobStatus' }

    JobEventDone:
      type: object
      required: [type, job_id, file]
      properties:
        type: { type: string, const: done }
        job_id: { type: string, format: uuid }
        file:
          type: object
          required: [filename, size_bytes, download_url]
          properties:
            filename: { type: string }
            size_bytes: { type: integer }
            mime_type: { type: string }
            sha256: { type: string }
            download_url: { type: string, format: uri }

    JobEventError:
      type: object
      required: [type, job_id, error]
      properties:
        type: { type: string, const: error }
        job_id: { type: string, format: uuid }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object, additionalProperties: true }
